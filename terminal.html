<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vikram Singh | Terminal Portfolio</title>
    <link rel="stylesheet" href="styles.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body class="theme-default">
    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-buttons">
                <span class="close"></span>
                <span class="minimize"></span>
                <span class="maximize"></span>
            </div>

            <div class="terminal-title">vikram@portfolio: ~/developer-journey</div>

            <div class="terminal-controls">
                <button class="icon-button" id="theme-toggle" aria-label="Open theme selector" title="Themes">
                    <i class="fa-solid fa-palette"></i>
                </button>
            </div>
        </div>

        <div class="terminal-container">
            <div class="terminal-content">
                <div id="output"></div>

                <div class="input-line">
                    <span class="prompt">vikram@portfolio:~$</span>
                    <input
                        type="text"
                        id="command-input"
                        autofocus
                        autocomplete="off"
                        spellcheck="false"
                        placeholder="Type help to explore..."
                    />
                </div>
            </div>
        </div>

        <div class="terminal-footer">
            <button class="footer-action" onclick="document.getElementById('command-input').value='about'; document.getElementById('command-input').focus();">
                <i class="fas fa-user"></i> About
            </button>

            <button class="footer-action" onclick="document.getElementById('command-input').value='projects'; document.getElementById('command-input').focus();">
                <i class="fas fa-code"></i> Projects
            </button>

            <button class="footer-action" onclick="document.getElementById('command-input').value='skills'; document.getElementById('command-input').focus();">
                <i class="fas fa-laptop-code"></i> Skills
            </button>

            <a href="./resume.pdf" class="resume-link" download="Vikram-Singh-Resume.pdf">
                <i class="fas fa-file-alt"></i> Download Resume
            </a>
        </div>

        <div class="context-menu">
            <div class="menu-item" data-action="split-h">Split Horizontally</div>
            <div class="menu-item" data-action="split-v">Split Vertically</div>
            <div class="menu-item" data-action="close-split">Close Split</div>
        </div>
    </div>

    <!-- Theme Modal -->
    <div id="theme-modal" class="modal">
        <div class="modal-content">
            <button class="close-button" aria-label="Close theme modal">&times;</button>
            <h2>Select Theme</h2>

            <div class="theme-options">
                <div class="theme-option" data-theme="default" tabindex="0">
                    <div class="theme-preview default-theme"></div>
                    <span>Default</span>
                </div>

                <div class="theme-option" data-theme="dracula" tabindex="0">
                    <div class="theme-preview dracula-theme"></div>
                    <span>Dracula</span>
                </div>

                <div class="theme-option" data-theme="solarized" tabindex="0">
                    <div class="theme-preview solarized-theme"></div>
                    <span>Solarized</span>
                </div>

                <div class="theme-option" data-theme="nord" tabindex="0">
                    <div class="theme-preview nord-theme"></div>
                    <span>Nord</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Projects Modal -->
    <div id="projects-modal" class="modal">
        <div class="modal-content projects-modal-content">
            <button class="close-button" aria-label="Close projects modal">&times;</button>
            <h2>My Projects</h2>
            <div class="projects-container">
                <!-- Dynamic project cards will render here -->
            </div>
        </div>
    </div>

    <!-- Skills Modal -->
    <div id="skills-modal" class="modal">
        <div class="modal-content skills-modal-content">
            <button class="close-button" aria-label="Close skills modal">&times;</button>
            <h2>My Skills</h2>
            <div class="skills-container">
                <!-- Dynamic skills content will render here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
